name: Docker Smoke Test (GHCR)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository_owner }}/depguard:latest

      - name: Check image architecture manifest
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/depguard:latest

      - name: Check Node runtime inside image
        run: docker run --rm --entrypoint node ghcr.io/${{ github.repository_owner }}/depguard:latest --version

      - name: Check MCP entrypoint exists
        run: docker run --rm --entrypoint sh ghcr.io/${{ github.repository_owner }}/depguard:latest -c "test -f /app/dist/index.js && echo OK"
